name: CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: FilmOnDemandAPPUI/filmondemand-app/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest suite
        env:
          TASTEDIVE_API_KEY: ci-placeholder
          TMDb_API_KEY: ci-placeholder
          TRAKT_API_KEY: ci-placeholder
          WATCHMODE_API_KEY: ci-placeholder
          OMDB_API_KEY: ci-placeholder
          GEMINI_API_KEY: ci-placeholder
        run: pytest

      - name: Install frontend dependencies
        working-directory: FilmOnDemandAPPUI/filmondemand-app
        run: npm ci

      - name: Type-check frontend
        working-directory: FilmOnDemandAPPUI/filmondemand-app
        run: npm run lint

      - name: Build frontend
        working-directory: FilmOnDemandAPPUI/filmondemand-app
        env:
          VITE_BACKEND_URL: http://localhost:8000
          APP_URL: http://localhost:3000
        run: npm run build

      - name: Build Docker image
        run: docker build -t filmondemand-ci .
